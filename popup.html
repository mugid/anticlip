<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AntiClip</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img src="icons/logo.svg" alt="AntiClip" class="brand-logo" />
        </div>
        <button class="toggle" type="button" data-toggle aria-pressed="true">On</button>
      </header>

      <section class="group" aria-label="Playback speed">
        <div class="group-head">
          <span>Speed multiplier</span>
          <span class="value" data-actual-rate>0.5x</span>
        </div>
        <div class="segments" aria-label="Speed multiplier">
          <button type="button" data-multiplier="0.25">0.25</button>
          <button type="button" data-multiplier="0.5" aria-pressed="true">0.5</button>
          <button type="button" data-multiplier="0.75">0.75</button>
          <button type="button" data-multiplier="1">1</button>
        </div>
      </section>

      <section class="group" aria-label="YouTube cleanup">
        <button class="row feature-row" type="button" data-feature="hideRecommendations" aria-pressed="false">
          <span class="row-icon">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M4 6h16" />
              <path d="M4 12h10" />
              <path d="M4 18h7" />
            </svg>
          </span>
          <strong>Watch recommendations</strong>
          <span class="switch" aria-hidden="true"></span>
        </button>
        <button class="row feature-row" type="button" data-feature="hideHomeRecommendations" aria-pressed="false">
          <span class="row-icon">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M4 5h7v6H4z" />
              <path d="M13 5h7v6h-7z" />
              <path d="M4 13h7v6H4z" />
              <path d="M13 13h7v6h-7z" />
            </svg>
          </span>
          <strong>Home feed</strong>
          <span class="switch" aria-hidden="true"></span>
        </button>
        <button class="row feature-row" type="button" data-feature="hideComments" aria-pressed="false">
          <span class="row-icon">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5 6h14v10H8l-3 3V6Z" />
              <path d="M9 10h6" />
              <path d="M9 13h4" />
            </svg>
          </span>
          <strong>Comments</strong>
          <span class="switch" aria-hidden="true"></span>
        </button>
        <button class="row feature-row" type="button" data-feature="hideShorts" aria-pressed="false">
          <span class="row-icon">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="m9 7 7 5-7 5V7Z" />
              <rect x="5" y="3" width="14" height="18" rx="4" />
            </svg>
          </span>
          <strong>Shorts</strong>
          <span class="switch" aria-hidden="true"></span>
        </button>
        <button class="row feature-row" type="button" data-feature="disableAutoplay" aria-pressed="false">
          <span class="row-icon">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M7 5v14" />
              <path d="M17 5v14" />
            </svg>
          </span>
          <strong>Autoplay</strong>
          <span class="switch" aria-hidden="true"></span>
        </button>
      </section>
    </main>
    <script src="dist/popup.js"></script>
  </body>
</html>
